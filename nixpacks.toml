[phases.setup]
nixPkgs = ["python39", "postgresql"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "cd back && PYTHONPATH=/app/back python manage.py migrate && PYTHONPATH=/app/back gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
