[phases.setup]
nixPkgs = ["python39", "postgresql_15"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "cd back && python manage.py migrate && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"

[variables]
LD_LIBRARY_PATH = "/nix/store/*-postgresql-*/lib:$LD_LIBRARY_PATH"
